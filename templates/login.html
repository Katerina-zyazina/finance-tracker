{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 shadow-lg border-0">
            <div class="text-center mb-4">
                <h3 class="fw-bold">Вход</h3>
                <p class="text-muted">Добро пожаловать в Finance Tracker</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small text-muted">Логин</label>
                    <input type="text" name="username" class="form-control form-control-lg" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted">Пароль</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Войти</button>
                <div class="text-center">
                    <span class="text-muted">Нет аккаунта?</span>
                    <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none">Зарегистрироваться</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
