{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">📝 Регистрация</h3>
                
                <!-- Форма отправляет данные методом POST на маршрут /register -->
                <form method="POST" action="{{ url_for('register') }}">
                    
                    <!-- Поле Логин -->
                    <div class="mb-3">
                        <label for="username" class="form-label">Придумайте логин</label>
                        <input type="text" 
                               class="form-control" 
                               id="username" 
                               name="username" 
                               placeholder="Например: student_2026" 
                               required>
                    </div>

                    <!-- Поле Пароль -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Придумайте пароль</label>
                        <input type="password" 
                               class="form-control" 
                               id="password" 
                               name="password" 
                               placeholder="Минимум 6 символов" 
                               required>
                    </div>

                    <!-- Кнопка отправки -->
                    <button type="submit" class="btn btn-success w-100">
                        Зарегистрироваться
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
